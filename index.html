<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Central de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Fundo Gradiente Pastel */
        body { background: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 100%); min-height: 100vh; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .sidebar-item { transition: all 0.3s; color: #6b21a8; }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.5); border-left: 4px solid #d946ef; }
        .content-section { transition: opacity 0.3s; }
    </style>
</head>
<body class="text-gray-800 font-sans flex min-h-screen">

    <aside class="w-64 bg-white/50 border-r border-purple-100 p-6 flex flex-col">
        <h2 class="text-2xl font-black text-purple-600 mb-10 tracking-tighter">SCALEFLOW</h2>
        <nav class="space-y-3 flex-grow">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="bar-chart-3" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="scan-eye" class="w-5 h-5"></i> Motor Intel</button>
            <button onclick="show('links')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="link-2" class="w-5 h-5"></i> Conversor</button>
            <button onclick="show('vault')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="image" class="w-5 h-5"></i> Vault</button>
            <button onclick="show('config')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="settings" class="w-5 h-5"></i> Configurações</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="dashboard" class="content-section">
            <h1 class="text-3xl font-bold mb-8 text-purple-900">Olá, pronta para escalar?</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card-shadow p-6 rounded-3xl border border-white">
                    <p class="text-xs uppercase text-purple-500 font-bold tracking-widest">Comissões Mensais</p>
                    <h3 class="text-4xl font-black mt-2 text-purple-700">R$ 0,00</h3>
                </div>
            </div>
        </div>

        <div id="intel" class="content-section hidden"><h2 class="text-2xl font-bold">Motor de Inteligência</h2></div>
        <div id="links" class="content-section hidden"><h2 class="text-2xl font-bold">Conversor</h2></div>
        <div id="vault" class="content-section hidden"><h2 class="text-2xl font-bold">Vault Criativos</h2></div>
        <div id="config" class="content-section hidden"><h2 class="text-2xl font-bold">Configurações</h2></div>
    </main>

    <script>
        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        lucide.createIcons();
    </script>
</body>
</html>
