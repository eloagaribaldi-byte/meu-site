<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Central de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: linear-gradient(135deg, #fdf2f8 0%, #f5f3ff 100%); min-height: 100vh; }
        .card-glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .sidebar-item { transition: all 0.3s; color: #6b21a8; border-left: 4px solid transparent; }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.5); border-left: 4px solid #d946ef; }
        .content-section { transition: opacity 0.3s; }
        @keyframes radar-beam { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .radar-box { position: relative; width: 120px; height: 120px; background: #111; border-radius: 50%; overflow: hidden; border: 2px solid #333; }
        .radar-beam { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(90deg, rgba(234,88,12,0) 0%, rgba(234,88,12,1) 100%); transform-origin: left center; }
        .scanning .radar-beam { animation: radar-beam 2s linear infinite; }
    </style>
</head>
<body class="text-gray-800 font-sans flex min-h-screen">

    <aside class="w-64 bg-white/40 border-r border-purple-100 p-6 flex flex-col">
        <h2 class="text-2xl font-black text-purple-700 mb-10 tracking-tighter italic">SCALEFLOW</h2>
        <nav class="space-y-2 flex-grow">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="scan-eye" class="w-5 h-5"></i> Motor Intel</button>
            <button onclick="show('links')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="link-2" class="w-5 h-5"></i> Conversor</button>
            <button onclick="show('vault')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="image" class="w-5 h-5"></i> Vault</button>
            <button onclick="show('roi')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="calculator" class="w-5 h-5"></i> ROI & Metas</button>
            <button onclick="show('config')" class="sidebar-item w-full text-left p-3 rounded-xl flex items-center gap-3 font-semibold"><i data-lucide="settings" class="w-5 h-5"></i> Configurações</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="dashboard" class="content-section">
            <h1 class="text-3xl font-bold mb-8 text-purple-900">Central de Comando</h1>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="card-glass p-6 rounded-3xl border-l-4 border-l-purple-400">
                    <p class="text-xs uppercase text-purple-500 font-bold">Comissões</p>
                    <h3 class="text-3xl font-black mt-2 text-purple-800">R$ 0,00</h3>
                </div>
                <div class="card-glass p-6 rounded-3xl border-l-4 border-l-green-400">
                    <p class="text-xs uppercase text-green-600 font-bold">Vendas</p>
                    <h3 class="text-3xl font-black mt-2 text-green-800">0</h3>
                </div>
                <div class="card-glass p-6 rounded-3xl border-l-4 border-l-blue-400">
                    <p class="text-xs uppercase text-blue-600 font-bold">Alta Procura</p>
                    <h3 class="text-3xl font-black mt-2 text-blue-800">0</h3>
                </div>
                <div class="card-glass p-6 rounded-3xl border-l-4 border-l-orange-400">
                    <p class="text-xs uppercase text-orange-600 font-bold">Comissão Extra</p>
                    <h3 class="text-3xl font-black mt-2 text-orange-800">R$ 0,00</h3>
                </div>
            </div>
        </div>

        <div id="intel" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6 text-purple-900">Motor de Inteligência</h2>
            <div class="card-glass p-8 rounded-3xl">
                <div class="flex items-center gap-6 mb-6">
                    <div id="radarContainer" class="radar-box"><div class="radar-beam"></div></div>
                    <input type="text" id="targetUrl" placeholder="Cole a URL para análise..." class="flex-grow bg-white/50 border border-purple-100 p-4 rounded-xl">
                </div>
                <button onclick="iniciarScan()" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl hover:bg-purple-700">Analisar com Inteligência</button>
            </div>
        </div>

        <div id="links" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6 text-purple-900">Conversor de Links</h2>
            <div class="card-glass p-8 rounded-3xl">
                <input type="text" id="urlInput" placeholder="URL original da Shopee..." class="w-full bg-white/50 border border-purple-100 p-4 rounded-xl mb-4">
                <button onclick="alert('Link convertido!')" class="w-full bg-purple-600 text-white font-bold py-4 rounded-xl">Gerar Link</button>
            </div>
        </div>

        <div id="config" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6 text-purple-900">Configurações</h2>
            <div class="card-glass p-8 rounded-3xl max-w-md">
                <div id="apiStatus" class="mb-4 p-3 rounded-lg bg-purple-100 text-purple-700 text-center font-bold">API não configurada</div>
                <input type="password" id="apiInput" placeholder="Sua chave de API..." class="w-full p-4 border border-purple-100 rounded-xl mb-4">
                <button onclick="saveApiKey()" class="w-full bg-purple-600 text-white py-3 rounded-xl">Salvar Chave</button>
            </div>
        </div>

        <div id="vault" class="content-section hidden"></div>
        <div id="roi" class="content-section hidden"></div>
    </main>

    <script>
        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function iniciarScan() {
            const container = document.getElementById('radarContainer');
            container.classList.add('scanning');
            setTimeout(() => { container.classList.remove('scanning'); alert("Análise concluída!"); }, 3000);
        }
        function saveApiKey() {
            const key = document.getElementById('apiInput').value;
            if(!key) return;
            localStorage.setItem('shopee_api_key', btoa(key));
            const status = document.getElementById('apiStatus');
            status.innerText = "API Conectada (Ativa)";
            status.className = "mb-4 p-3 rounded-lg bg-green-100 text-green-700 font-bold text-center";
            document.getElementById('apiInput').value = '';
        }
        lucide.createIcons();
    </script>
</body>
</html>
