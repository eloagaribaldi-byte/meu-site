<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Central de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos inspirados na estética sci-fi e dark */
        body { 
            background-color: #0c1016; /* Fundo grafite profundo */
            font-family: 'JetBrains+Mono', monospace; /* Fonte técnica */
            color: #d1d5db; /* Texto cinza claro para conforto */
        }
        
        /* Efeito de vidro "Glow" sci-fi nos cards */
        .card-scifi { 
            background: rgba(17, 24, 39, 0.7); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(139, 92, 246, 0.2); /* Borda roxa sutil */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }
        
        /* Detalhes de borda neon inspirados na imagem */
        .border-neon-orange { border-left: 4px solid #f97316; box-shadow: -2px 0 10px rgba(249, 115, 22, 0.2); }
        .border-neon-cyan { border-left: 4px solid #22d3ee; box-shadow: -2px 0 10px rgba(34, 211, 238, 0.2); }
        .border-neon-purple { border-left: 4px solid #a855f7; box-shadow: -2px 0 10px rgba(168, 85, 247, 0.2); }
        
        /* Animação do Radar com a cor ciano da referência */
        @keyframes radar-beam { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .radar-box { position: relative; width: 150px; height: 150px; background: #0c1016; border-radius: 50%; overflow: hidden; border: 2px solid #333; }
        .radar-beam { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(90deg, rgba(34,211,238,0) 0%, rgba(34,211,238,1) 100%); transform-origin: left center; }
        .scanning .radar-beam { animation: radar-beam 2s linear infinite; }

        /* Estilos do menu lateral */
        .sidebar-item { transition: all 0.3s; color: #9ca3af; border-left: 4px solid transparent; }
        .sidebar-item:hover, .sidebar-active { background: rgba(168, 85, 247, 0.05); color: #a855f7; border-left: 4px solid #a855f7; }
        
        /* Textos e detalhes inspirados na imagem */
        .glow-text-cyan { text-shadow: 0 0 5px rgba(34, 211, 238, 0.5); color: #22d3ee; }
        .glow-text-orange { text-shadow: 0 0 5px rgba(249, 115, 22, 0.5); color: #f97316; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-gray-950/70 border-r border-gray-800 p-6 flex flex-col card-scifi">
        <h2 class="text-xl font-bold glow-text-cyan mb-10 tracking-widest italic flex items-center gap-2"><i data-lucide="chevrons-up" class="w-6 h-6"></i> SCALEFLOW</h2>
        <nav class="space-y-2 flex-grow">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-semibold sidebar-active"><i data-lucide="bar-chart-3" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-semibold"><i data-lucide="focus" class="w-5 h-5"></i> Motor Intel</button>
            <button onclick="show('links')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-semibold"><i data-lucide="link" class="w-5 h-5"></i> Conversor</button>
            <button onclick="show('vault')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="video" class="w-5 h-5"></i> Vault Criativos</button>
            <button onclick="show('config')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="user-plus" class="w-5 h-5"></i> Configurações</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="dashboard" class="content-section">
            <h1 class="text-3xl font-bold mb-8 glow-text-cyan">Central de Comando</h1>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                <div class="card-scifi p-6 rounded-2xl border-neon-orange">
                    <p class="text-xs uppercase text-orange-400 font-bold tracking-wider">Comissões Mensais</p>
                    <h3 class="text-3xl font-bold mt-2 glow-text-orange">R$ 0,00</h3>
                </div>
                <div class="card-scifi p-6 rounded-2xl border-neon-cyan relative">
                    <div class="absolute top-4 right-4 text-xs font-mono text-cyan-600 bg-cyan-950/40 px-2 py-1 rounded">Métrica: 24h</div>
                    <p class="text-xs uppercase text-cyan-400 font-bold tracking-wider">Vendas Totais</p>
                    <h3 class="text-3xl font-bold mt-2 glow-text-cyan">0</h3>
                </div>
                <div class="card-scifi p-6 rounded-2xl border-neon-cyan">
                    <p class="text-xs uppercase text-cyan-400 font-bold tracking-wider">Alta Procura</p>
                    <h3 class="text-3xl font-bold mt-2 glow-text-cyan">0</h3>
                </div>
                <div class="card-scifi p-6 rounded-2xl border-neon-orange relative">
                    <div class="absolute top-4 right-4 text-xs font-mono text-orange-600 bg-orange-950/40 px-2 py-1 rounded">Extra: 15%</div>
                    <p class="text-xs uppercase text-orange-400 font-bold tracking-wider">Comissão Extra</p>
                    <h3 class="text-3xl font-bold mt-2 glow-text-orange">R$ 0,00</h3>
                </div>
            </div>
        </div>

        <div id="intel" class="content-section hidden">
            <h2 class="text-3xl font-bold mb-6 glow-text-cyan">Motor de Inteligência</h2>
            <div class="card-scifi p-8 rounded-3xl grid grid-cols-3 gap-8">
                <div class="col-span-1 flex flex-col items-center gap-6">
                    <div id="radarContainer" class="radar-box flex items-center justify-center">
                        <div class="radar-beam"></div>
                        <i data-lucide="alert-triangle" class="w-12 h-12 text-cyan-950 opacity-20"></i>
                    </div>
                </div>
                <div class="col-span-2 flex flex-col gap-6">
                    <input type="text" id="targetUrl" placeholder="Cole a URL Shopee (Ex: /product/...)" class="flex-grow bg-gray-950 border border-gray-800 p-4 rounded-xl focus:border-cyan-500 outline-none">
                    <button onclick="iniciarScan()" class="w-full bg-cyan-600 text-cyan-50 font-bold py-4 rounded-xl hover:bg-cyan-700 transition">Analisar com Inteligência</button>
                </div>
            </div>
        </div>

        <div id="links" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6 text-gray-200">Conversor de Links</h2>
            <div class="card-scifi p-8 rounded-2xl border border-gray-800">
                <input type="text" id="urlInput" placeholder="https://shopee.com.br/product/..." class="w-full bg-gray-950 border border-gray-800 p-4 rounded-xl mb-4 focus:border-cyan-500 outline-none">
                <button onclick="alert('Link convertido!')" class="w-full bg-gray-700 text-gray-200 font-bold py-4 rounded-xl hover:bg-gray-800 transition">Gerar Link de Afiliado</button>
            </div>
        </div>

        <div id="config" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6 text-gray-200">Configurações de Segurança</h2>
            <div class="card-scifi p-8 rounded-2xl border border-gray-800 max-w-md">
                <div id="apiStatus" class="mb-4 p-3 rounded-lg bg-gray-950 text-gray-600 font-bold text-center border border-gray-800">Status: API não configurada</div>
                <input type="password" id="apiInput" placeholder="Sua chave de API..." class="w-full p-4 border border-gray-800 bg-gray-950 rounded-xl mb-4 focus:border-green-500 outline-none">
                <button onclick="saveApiKey()" class="w-full bg-green-600 text-green-50 py-3 rounded-xl hover:bg-green-700 transition">Salvar Chave</button>
            </div>
        </div>

        <div id="vault" class="content-section hidden"></div>
        <div id="roi" class="content-section hidden"></div>
    </main>

    <script>
        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            
            document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('sidebar-active'));
            document.querySelector(`button[onclick="show('${id}')"]`).classList.add('sidebar-active');
        }
        function iniciarScan() {
            const container = document.getElementById('radarContainer');
            container.classList.add('scanning');
            setTimeout(() => { container.classList.remove('scanning'); alert("Análise concluída!"); }, 3000);
        }
        function saveApiKey() {
            const key = document.getElementById('apiInput').value;
            if(!key) return;
            localStorage.setItem('shopee_api_key', btoa(key));
            const status = document.getElementById('apiStatus');
            status.innerText = "Status: API Conectada (Ativa)";
            status.className = "mb-4 p-3 rounded-lg bg-green-950/40 text-green-500 font-bold text-center border border-green-800 glow-text-cyan";
            document.getElementById('apiInput').value = '';
        }
        lucide.createIcons();
    </script>
</body>
</html>
