<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Central de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .sidebar-item { transition: all 0.2s; color: #4b5563; border-left: 4px solid transparent; }
        .sidebar-item:hover { background: #fff7ed; color: #ea580c; border-left: 4px solid #ea580c; }
        .content-section { transition: opacity 0.2s; }
        @keyframes radar-beam { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .radar-box { position: relative; width: 120px; height: 120px; background: #111; border-radius: 50%; overflow: hidden; border: 2px solid #333; }
        .radar-beam { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(90deg, rgba(234,88,12,0) 0%, rgba(234,88,12,1) 100%); transform-origin: left center; }
        .scanning .radar-beam { animation: radar-beam 2s linear infinite; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col">
        <h2 class="text-xl font-black text-orange-600 mb-10 tracking-tighter italic">SCALEFLOW</h2>
        <nav class="space-y-1 flex-grow">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="radar" class="w-5 h-5"></i> Motor de Inteligência</button>
            <button onclick="show('links')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="link" class="w-5 h-5"></i> Conversor</button>
            <button onclick="show('vault')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="video" class="w-5 h-5"></i> Vault Criativos</button>
            <button onclick="show('config')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="shield-check" class="w-5 h-5"></i> Configurações</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="dashboard" class="content-section">
            <h1 class="text-3xl font-bold mb-8">Central de Comando</h1>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-2xl card-shadow border-l-4 border-l-orange-500">
                    <p class="text-xs uppercase text-gray-500 font-bold">Comissões (Mês)</p>
                    <h3 class="text-3xl font-black mt-2 text-gray-800">R$ 0,00</h3>
                </div>
            </div>
        </div>

        <div id="links" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6">Conversor de Links</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow mb-6 border border-gray-100">
                <input type="text" id="urlInput" placeholder="Cole a URL original da Shopee aqui..." class="w-full bg-gray-50 border p-4 rounded-xl mb-4 focus:border-orange-500 outline-none">
                <button onclick="converterLink()" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl hover:bg-orange-700 transition">Gerar Link de Afiliado</button>
            </div>
        </div>

        <div id="intel" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6">Motor de Inteligência</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow border border-gray-100">
                <div class="flex items-center gap-6 mb-6">
                    <div id="radarContainer" class="radar-box"><div class="radar-beam"></div></div>
                    <input type="text" id="targetUrl" placeholder="Cole a URL para análise..." class="flex-grow bg-gray-50 border p-4 rounded-xl">
                </div>
                <button onclick="iniciarScan()" id="btnScan" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl">Analisar com Inteligência</button>
            </div>
        </div>

        <div id="config" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6">Configurações</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow max-w-md border border-gray-100">
                <div id="apiStatus" class="mb-4 p-3 rounded-lg bg-gray-100 text-gray-600 font-bold text-center">Status: API não configurada</div>
                <input type="password" id="apiInput" placeholder="Sua chave de API..." class="w-full p-4 border rounded-xl mb-4">
                <button onclick="saveApiKey()" class="w-full bg-black text-white py-3 rounded-xl hover:bg-gray-800">Salvar Chave</button>
            </div>
        </div>

        <div id="vault" class="content-section hidden"></div>
    </main>

    <script>
        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function iniciarScan() {
            const container = document.getElementById('radarContainer');
            container.classList.add('scanning');
            setTimeout(() => { container.classList.remove('scanning'); alert("Análise concluída!"); }, 3000);
        }
        function converterLink() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Cole uma URL!");
            alert("Link processado e convertido!");
        }
        function saveApiKey() {
            const key = document.getElementById('apiInput').value;
            if(!key) return;
            localStorage.setItem('shopee_api_key', btoa(key));
            const status = document.getElementById('apiStatus');
            status.innerText = "Status: API Conectada (Ativa)";
            status.className = "mb-4 p-3 rounded-lg bg-green-100 text-green-700 font-bold text-center";
            document.getElementById('apiInput').value = '';
        }
        // Verificar status ao carregar
        window.onload = () => {
            if(localStorage.getItem('shopee_api_key')) {
                const status = document.getElementById('apiStatus');
                status.innerText = "Status: API Conectada (Ativa)";
                status.className = "mb-4 p-3 rounded-lg bg-green-100 text-green-700 font-bold text-center";
            }
        };
        lucide.createIcons();
    </script>
</body>
</html>
