<div id="intel" class="hidden">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-2xl font-bold">Radar de Oportunidades</h2>
            <p class="text-gray-500 text-sm">Analise produtos antes de investir tempo na criação.</p>
        </div>
        <button onclick="document.getElementById('modal-analise').classList.remove('hidden')" class="bg-orange-600 hover:bg-orange-500 px-6 py-2 rounded-xl font-bold flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i> Nova Análise
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-[#111] p-6 rounded-2xl border border-[#222] hover:border-orange-500/50 transition">
            <div class="flex justify-between items-start mb-4">
                <span class="bg-orange-500/10 text-orange-500 text-[10px] font-bold px-2 py-1 rounded">ALTA DEMANDA</span>
                <span class="text-gray-500 text-xs">Margem: 25%</span>
            </div>
            <h3 class="font-bold mb-2">Fone Wireless Sport Pro</h3>
            <div class="flex gap-4 text-sm text-gray-400">
                <span>Comissão: R$ 12,00</span>
                <span>Nota: 4.8</span>
            </div>
            <button class="mt-4 w-full py-2 bg-[#222] hover:bg-[#333] rounded-lg text-sm font-medium">Ver Detalhes</button>
        </div>
    </div>
</div>

<div id="modal-analise" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
    <div class="bg-[#111] p-8 rounded-2xl w-full max-w-lg border border-[#222]">
        <h3 class="text-xl font-bold mb-6">Analisar novo produto</h3>
        <input type="text" placeholder="Cole a URL da Shopee..." class="w-full bg-[#050505] border border-[#333] p-4 rounded-xl mb-4 focus:border-orange-600 outline-none">
        <div class="flex gap-3">
            <button onclick="document.getElementById('modal-analise').classList.add('hidden')" class="flex-1 py-3 bg-[#222] rounded-xl font-bold">Cancelar</button>
            <button class="flex-1 py-3 bg-orange-600 rounded-xl font-bold">Processar Radar</button>
        </div>
    </div>
</div>
