<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sidebar-item:hover { background: #FF5722; color: white; }
    </style>
</head>
<body class="bg-[#0A0A0A] text-gray-200 flex min-h-screen">

    <aside class="w-64 bg-[#111] border-r border-[#222] p-6">
        <h2 class="text-xl font-black text-orange-500 mb-10 tracking-widest">SCALEFLOW</h2>
        <nav class="space-y-2">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button onclick="show('links')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3"><i data-lucide="link"></i> Conversor</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3"><i data-lucide="radar"></i> Radar</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="dashboard" class="content-section">
            <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
            <p>Seja bem-vindo ao seu painel.</p>
        </div>

        <div id="links" class="content-section hidden">
            <h1 class="text-2xl font-bold mb-4">Conversor</h1>
            <p>Cole seu link aqui.</p>
        </div>

        <div id="intel" class="content-section hidden">
            <h1 class="text-2xl font-bold mb-4">Radar de Produtos</h1>
            <p>Análise de mercado.</p>
        </div>
    </main>

    <script>
        // Função Central de Visibilidade
        function show(id) {
            // Esconde todas as seções
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            // Mostra apenas a selecionada
            document.getElementById(id).classList.remove('hidden');
        }
        lucide.createIcons();
    </script>
</body>
</html>
