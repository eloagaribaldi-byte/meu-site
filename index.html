<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Garimpo - Shopee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bg-orange-brand { background-color: #FF5722; }
        .text-orange-brand { color: #FF5722; }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-black text-white mb-2">MINHAS <span class="text-orange-brand">OPORTUNIDADES</span></h1>
            <p class="text-gray-400">Garimpe, organize e escale com inteligência.</p>
        </header>

        <div class="bg-gray-900 p-6 rounded-2xl shadow-2xl border border-gray-800 mb-8">
            <div class="space-y-4">
                <input type="text" id="link" placeholder="Cole o link do produto aqui..." 
                    class="w-full bg-black border border-gray-700 p-4 rounded-xl text-white focus:ring-2 focus:ring-orange-brand outline-none transition">
                <textarea id="obs" placeholder="Por que este produto é um vencedor? (ex: nicho, sazonalidade, ticket)..." 
                    class="w-full bg-black border border-gray-700 p-4 rounded-xl text-white focus:ring-2 focus:ring-orange-brand outline-none h-24"></textarea>
                <button onclick="salvarProduto()" 
                    class="w-full bg-orange-brand hover:bg-orange-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition transform active:scale-95">
                    <i data-lucide="plus-circle"></i> Adicionar ao Garimpo
                </button>
            </div>
        </div>

        <div id="listaProdutos" class="space-y-4"></div>
    </div>

    <script>
        function salvarProduto() {
            const link = document.getElementById('link').value;
            const obs = document.getElementById('obs').value;
            if(!link) return alert("Cole o link!");

            const produto = { link, obs, data: new Date().toLocaleDateString() };
            const lista = JSON.parse(localStorage.getItem('garimpo') || '[]');
            lista.unshift(produto);
            localStorage.setItem('garimpo', JSON.stringify(lista));
            
            document.getElementById('link').value = '';
            document.getElementById('obs').value = '';
            carregarLista();
        }

        function carregarLista() {
            const lista = JSON.parse(localStorage.getItem('garimpo') || '[]');
            const container = document.getElementById('listaProdutos');
            container.innerHTML = lista.map((p, i) => `
                <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 flex justify-between items-start group hover:border-orange-brand transition">
                    <div>
                        <span class="text-xs text-gray-500">${p.data}</span>
                        <a href="${p.link}" target="_blank" class="block text-orange-brand font-bold mt-1 hover:underline">Ver Produto Shopee</a>
                        <p class="text-gray-300 mt-2 text-sm">${p.obs}</p>
                    </div>
                    <button onclick="excluir(${i})" class="text-gray-600 hover:text-red-500">
                        <i data-lucide="trash-2"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function excluir(index) {
            let lista = JSON.parse(localStorage.getItem('garimpo'));
            lista.splice(index, 1);
            localStorage.setItem('garimpo', JSON.stringify(lista));
            carregarLista();
        }

        carregarLista();
        lucide.createIcons();
    </script>
</body>
</html>
