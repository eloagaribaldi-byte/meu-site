<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Central de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .sidebar-item { transition: all 0.2s; color: #4b5563; border-left: 4px solid transparent; }
        .sidebar-item:hover { background: #fff7ed; color: #ea580c; border-left: 4px solid #ea580c; }
        .content-section { transition: opacity 0.2s; }

        /* Animações do Radar */
        @keyframes radar-beam {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes radar-pulse {
            0% { opacity: 1; scale: 1; }
            80% { opacity: 0; scale: 1.5; }
            100% { opacity: 0; scale: 1.5; }
        }

        .radar-box { position: relative; width: 150px; height: 150px; background: #111; border-radius: 50%; border: 2px solid #333; overflow: hidden; }
        .radar-beam { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(90deg, rgba(234,88,12,0) 0%, rgba(234,88,12,1) 100%); transform-origin: left center; }
        .radar-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid rgba(234,88,12,0.3); }
        
        /* Classes para ativar animação via JS */
        .scanning .radar-beam { animation: radar-beam 2s linear infinite; }
        .scanning .radar-circle { animation: radar-pulse 2s infinite; }
        .scanning .radar-circle:nth-child(2) { animation-delay: 0.5s; }
        .scanning .radar-circle:nth-child(3) { animation-delay: 1s; }

    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col">
        <h2 class="text-xl font-black text-orange-600 mb-10 tracking-tighter italic">SCALEFLOW</h2>
        <nav class="space-y-1 flex-grow">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="show('links')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="link" class="w-5 h-5"></i> Conversor</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="radar" class="w-5 h-5"></i> Radar</button>
            <button onclick="show('vault')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="video" class="w-5 h-5"></i> Vault Criativos</button>
            <button onclick="show('calendario')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="calendar" class="w-5 h-5"></i> Calendário</button>
            <button onclick="show('rejeicoes')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="x-octagon" class="w-5 h-5"></i> Log Rejeições</button>
            <button onclick="show('roi')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="calculator" class="w-5 h-5"></i> Calculadora ROI</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="dashboard" class="content-section">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">Visão Geral</h1>
                <label class="cursor-pointer bg-black text-white px-6 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-gray-800">
                    <i data-lucide="upload" class="w-4 h-4"></i> Importar CSV Shopee
                    <input type="file" id="csvFile" class="hidden" accept=".csv">
                </label>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-2xl card-shadow border-l-4 border-l-orange-500">
                    <p class="text-xs uppercase text-gray-500 font-bold">Comissões Altas</p>
                    <h3 class="text-3xl font-black mt-2 text-gray-800">R$ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl card-shadow border-l-4 border-l-green-500">
                    <p class="text-xs uppercase text-gray-500 font-bold">Vendas Totais</p>
                    <h3 class="text-3xl font-black mt-2 text-gray-800">0</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl card-shadow border-l-4 border-l-blue-500">
                    <p class="text-xs uppercase text-gray-500 font-bold">Alta Procura</p>
                    <h3 class="text-3xl font-black mt-2 text-gray-800">0</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl card-shadow border-l-4 border-l-purple-500">
                    <p class="text-xs uppercase text-gray-500 font-bold">Comissão Extra</p>
                    <h3 class="text-3xl font-black mt-2 text-gray-800">R$ 0,00</h3>
                </div>
            </div>
        </div>

        <div id="links" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6">Conversor de Links</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow mb-6 border border-gray-100">
                <input type="text" id="urlInput" placeholder="Cole URL aqui..." class="w-full bg-gray-50 border p-4 rounded-xl mb-4 focus:border-orange-500 outline-none">
                <button onclick="converterLink()" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl hover:bg-orange-700">Gerar Link</button>
            </div>
            <table class="w-full bg-white rounded-2xl card-shadow overflow-hidden"><tbody id="historicoLinks"></tbody></table>
        </div>

        <div id="intel" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6">Radar de Mercado</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow border border-gray-100 mb-6">
                <div class="flex items-center gap-6">
                    <div id="radarContainer" class="radar-box flex-shrink-0">
                        <div class="radar-beam"></div>
                        <div class="radar-circle w-1/4 h-1/4"></div>
                        <div class="radar-circle w-1/2 h-1/2"></div>
                        <div class="radar-circle w-3/4 h-3/4"></div>
                        <i data-lucide="target" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 text-orange-600 opacity-50"></i>
                    </div>
                    <div class="flex-grow">
                        <input type="text" id="radarUrlInput" placeholder="Cole a URL do produto Shopee..." class="w-full bg-gray-50 border p-4 rounded-xl mb-4 focus:border-orange-500 outline-none">
                        <button onclick="iniciarScan()" id="btnScan" class="w-full bg-black text-white font-bold py-4 rounded-xl hover:bg-gray-800 flex items-center justify-center gap-2">
                            <i data-lucide="search" class="w-5 h-5"></i> Analisar Produto
                        </button>
                    </div>
                </div>
            </div>
            <div id="radarResults" class="hidden animate-pulse">
                <div class="bg-white p-6 rounded-2xl card-shadow border border-orange-100">
                    <h4 class="font-bold text-orange-600">Análise Concluída</h4>
                    <p class="text-sm text-gray-500 mt-1">Produto com alto potencial de conversão detectado.</p>
                </div>
            </div>
        </div>

        <div id="vault" class="content-section hidden"><h2 class="text-2xl font-bold">Vault de Criativos</h2></div>
        <div id="calendario" class="content-section hidden"><h2 class="text-2xl font-bold">Calendário de Postagens</h2></div>
        <div id="rejeicoes" class="content-section hidden"><h2 class="text-2xl font-bold">Log de Rejeições</h2></div>
        <div id="roi" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6">Calculadora ROI</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow max-w-md">
                <input type="number" id="price" placeholder="Preço do Produto (R$)" class="w-full p-3 border rounded-xl mb-4">
                <input type="number" id="comissao" placeholder="% Comissão" class="w-full p-3 border rounded-xl mb-4">
                <button onclick="calcularROI()" class="w-full bg-black text-white py-3 rounded-xl">Calcular</button>
                <div id="resultadoROI" class="mt-4 p-3 bg-orange-50 text-orange-800 rounded-lg font-bold hidden"></div>
            </div>
        </div>
    </main>

    <script>
        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function converterLink() {
            const input = document.getElementById('urlInput');
            if (!input.value) return;
            const tbody = document.getElementById('historicoLinks');
            tbody.innerHTML += `<tr class="border-b"><td class="p-4 text-sm font-medium">Link Convertido</td><td class="p-4 text-orange-600 font-bold underline cursor-pointer">${input.value.substring(0,25)}...</td></tr>`;
            input.value = '';
        }
        function calcularROI() {
            const p = document.getElementById('price').value;
            const c = document.getElementById('comissao').value;
            const res = document.getElementById('resultadoROI');
            res.classList.remove('hidden');
            res.innerHTML = `Lucro Estimado: R$ ${(p * c / 100).toFixed(2)}`;
        }

        // Lógica da Animação do Radar
        function iniciarScan() {
            const input = document.getElementById('radarUrlInput');
            const container = document.getElementById('radarContainer');
            const results = document.getElementById('radarResults');
            const btn = document.getElementById('btnScan');

            if (!input.value) { alert("Cole uma URL primeiro!"); return; }

            // Ativa animação
            container.classList.add('scanning');
            btn.innerHTML = `<i data-lucide="loader-circle" class="w-5 h-5 animate-spin"></i> Escaneando...`;
            btn.disabled = true;
            results.classList.add('hidden');
            lucide.createIcons(); // Atualiza ícone do botão

            // Simula tempo de busca (3 segundos)
            setTimeout(() => {
                container.classList.remove('scanning');
                btn.innerHTML = `<i data-lucide="search" class="w-5 h-5"></i> Analisar Produto`;
                btn.disabled = false;
                results.classList.remove('hidden'); // Mostra resultado simulado
                input.value = '';
                lucide.createIcons();
            }, 3000);
        }

        document.getElementById('csvFile').addEventListener('change', function(e) {
            alert("Analisando relatório Shopee...");
        });
        lucide.createIcons();
    </script>
</body>
</html>
