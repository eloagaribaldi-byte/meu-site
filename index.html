<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Dashboard de Afiliada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sidebar-item { transition: all 0.2s; }
        .sidebar-item:hover { background: #FF5722; color: white; }
    </style>
</head>
<body class="bg-[#0A0A0A] text-gray-200 font-sans flex min-h-screen">

    <aside class="w-64 bg-[#111] border-r border-[#222] p-6 flex flex-col">
        <h2 class="text-xl font-black text-orange-500 mb-10 tracking-widest">SCALEFLOW</h2>
        <nav class="space-y-2 flex-grow">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button onclick="show('links')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3"><i data-lucide="link"></i> Conversor</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3"><i data-lucide="trending-up"></i> Intel Produtos</button>
            <button onclick="show('creative')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3"><i data-lucide="zap"></i> Criativos</button>
        </nav>
        <div class="mt-auto border-t border-[#222] pt-6 text-xs text-gray-600 italic">v1.0 - Modo Prático</div>
    </aside>

    <main class="flex-1 p-8" id="content">
        <div id="dashboard">
            <h1 class="text-2xl font-bold mb-8">Olá, pronta para escalar hoje?</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-[#111] p-6 rounded-2xl border border-[#222]">
                    <p class="text-sm text-gray-500">Cliques Hoje</p>
                    <h3 class="text-3xl font-bold mt-1">0</h3>
                </div>
                <div class="bg-[#111] p-6 rounded-2xl border border-[#222]">
                    <p class="text-sm text-gray-500">Oportunidades Vistas</p>
                    <h3 class="text-3xl font-bold mt-1">0</h3>
                </div>
                <div class="bg-[#111] p-6 rounded-2xl border border-[#222] border-orange-500/20">
                    <p class="text-sm text-orange-500">Comissões Acumuladas</p>
                    <h3 class="text-3xl font-bold mt-1 text-orange-500">R$ 0,00</h3>
                </div>
            </div>
        </div>

        <div id="intel" class="hidden">
            <h2 class="text-2xl font-bold mb-6">Radar de Produtos</h2>
            <div class="bg-[#111] p-8 rounded-2xl border border-[#222] text-center">
                <i data-lucide="radar" class="mx-auto w-12 h-12 text-gray-700 mb-4"></i>
                <p class="text-gray-400">O radar está desligado. Conecte sua API ou cole um link para iniciar a análise de escala.</p>
                <button class="mt-6 bg-orange-600 px-8 py-3 rounded-xl font-bold hover:bg-orange-500 transition">Analisar Primeiro Produto</button>
            </div>
        </div>

        <div id="links" class="hidden"><h2 class="text-2xl font-bold">Conversor Rápido</h2></div>
        <div id="creative" class="hidden"><h2 class="text-2xl font-bold">Gerador de Criativos</h2></div>
    </main>

    <script>
        function show(id) {
            document.querySelectorAll('#content > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        lucide.createIcons();
    </script>
</body>
</html>
