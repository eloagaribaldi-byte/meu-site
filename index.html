<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Dashboard de Afiliada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .sidebar-item:hover { background: #fff7ed; color: #ea580c; border-left: 4px solid #ea580c; }
        .content-section { transition: opacity 0.2s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col">
        <h2 class="text-xl font-black text-orange-600 mb-10 tracking-tighter">SCALEFLOW</h2>
        <nav class="space-y-2 flex-grow">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium transition"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="show('links')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium transition"><i data-lucide="link" class="w-5 h-5"></i> Conversor</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium transition"><i data-lucide="radar" class="w-5 h-5"></i> Radar</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        
        <div id="dashboard" class="content-section">
            <h1 class="text-3xl font-bold mb-8">Olá, pronta para escalar?</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl card-shadow border border-gray-100">
                    <p class="text-xs uppercase text-gray-500 font-bold">Comissões (Mês)</p>
                    <h3 class="text-4xl font-black mt-2 text-orange-600">R$ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl card-shadow border border-gray-100">
                    <p class="text-xs uppercase text-gray-500 font-bold">Cliques Hoje</p>
                    <h3 class="text-4xl font-black mt-2 text-gray-800">0</h3>
                </div>
            </div>
        </div>

        <div id="links" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6">Conversor de Links</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow border border-gray-100">
                <input type="text" id="urlInput" placeholder="Cole o link do produto original..." class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl outline-none focus:border-orange-500 mb-4">
                <button onclick="converterLink()" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl hover:bg-orange-700 transition shadow-lg shadow-orange-500/30">Gerar Link de Afiliado</button>
            </div>
            <div class="mt-8">
                <table class="w-full bg-white rounded-2xl card-shadow overflow-hidden">
                    <thead class="bg-gray-50 text-gray-500 text-sm uppercase">
                        <tr><th class="p-4 text-left">Produto</th><th class="p-4 text-left">Link</th></tr>
                    </thead>
                    <tbody id="historicoLinks" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <div id="intel" class="content-section hidden">
            <h2 class="text-2xl font-bold mb-6">Radar de Produtos</h2>
            <div class="bg-white p-12 rounded-2xl border border-dashed border-gray-300 text-center">
                <p class="text-gray-500">Cole uma URL para analisar a escalabilidade do produto.</p>
            </div>
        </div>
    </main>

    <script>
        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function converterLink() {
            const input = document.getElementById('urlInput');
            const link = input.value;
            if (!link) return;
            const tbody = document.getElementById('historicoLinks');
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="p-4 text-gray-700 font-medium">Produto Shopee</td>
                            <td class="p-4 text-orange-600 font-bold underline cursor-pointer">${link.substring(0, 30)}...</td>`;
            tbody.prepend(tr);
            input.value = '';
        }

        lucide.createIcons();
    </script>
</body>
</html>
