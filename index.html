<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ScaleFlow | Central de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .sidebar-item { transition: all 0.2s; color: #4b5563; border-left: 4px solid transparent; }
        .sidebar-item:hover { background: #fff7ed; color: #ea580c; border-left: 4px solid #ea580c; }
        .content-section { transition: opacity 0.2s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col">
        <h2 class="text-xl font-black text-orange-600 mb-10 tracking-tighter italic">SCALEFLOW</h2>
        <nav class="space-y-1 flex-grow">
            <button onclick="show('dashboard')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="show('intel')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="radar" class="w-5 h-5"></i> Motor de Inteligência</button>
            <button onclick="show('config')" class="sidebar-item w-full text-left p-3 rounded-lg flex items-center gap-3 font-medium"><i data-lucide="shield-check" class="w-5 h-5"></i> Configurações</button>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div id="intel" class="content-section hidden">
            <h2 class="text-3xl font-bold mb-6">Motor de Inteligência</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow border border-gray-100">
                <input type="text" id="targetUrl" placeholder="Cole a URL para análise..." class="w-full bg-gray-50 border p-4 rounded-xl mb-6">
                <button onclick="validarProduto()" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl">Consolidar Dados</button>
            </div>
        </div>

        <div id="config" class="content-section">
            <h2 class="text-3xl font-bold mb-6">Segurança e API</h2>
            <div class="bg-white p-8 rounded-2xl card-shadow border border-gray-100 max-w-lg">
                <label class="block text-sm font-bold text-gray-500 mb-2">Chave de API Shopee (Tokens)</label>
                <input type="password" id="apiInput" placeholder="Cole sua chave aqui..." class="w-full bg-gray-50 border p-4 rounded-xl mb-4">
                <button onclick="saveApiKey()" class="w-full bg-black text-white font-bold py-3 rounded-xl hover:bg-gray-800">Salvar Chave com Segurança</button>
                <p class="text-xs text-gray-400 mt-4 italic">* A chave é salva apenas no seu navegador. Nunca a compartilhe ou envie para servidores externos.</p>
            </div>
        </div>
    </main>

    <script>
        function show(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function saveApiKey() {
            const key = document.getElementById('apiInput').value;
            if(!key) return;
            // Criptografia básica usando btoa (base64) para ocultar do olho nu
            localStorage.setItem('shopee_api_key', btoa(key));
            document.getElementById('apiInput').value = '';
            alert("Chave salva com segurança no seu navegador.");
        }

        function getApiKey() {
            const saved = localStorage.getItem('shopee_api_key');
            return saved ? atob(saved) : null;
        }

        lucide.createIcons();
    </script>
</body>
</html>
