<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Garimpo Pro | Afiliada Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .active-tab { border-left: 4px solid #F97316; background: #111; }
    </style>
</head>
<body class="bg-black text-white font-sans flex min-h-screen">

    <aside class="w-64 bg-gray-900 p-6 flex flex-col border-r border-gray-800">
        <h2 class="text-2xl font-black text-orange-500 mb-10">GARIMPO PRO</h2>
        <nav class="space-y-4">
            <button onclick="show('dashboard')" class="w-full text-left p-3 hover:bg-gray-800 rounded flex items-center gap-3"><i data-lucide="layout-dashboard"></i> Dashboard</button>
            <button onclick="show('links')" class="w-full text-left p-3 hover:bg-gray-800 rounded flex items-center gap-3"><i data-lucide="link"></i> Links & Conversor</button>
            <button onclick="show('intel')" class="w-full text-left p-3 hover:bg-gray-800 rounded flex items-center gap-3"><i data-lucide="brain-circuit"></i> Intel Produtos</button>
            <button onclick="show('creative')" class="w-full text-left p-3 hover:bg-gray-800 rounded flex items-center gap-3"><i data-lucide="sparkles"></i> Criativos & IA</button>
        </nav>
    </aside>

    <main class="flex-1 p-10" id="content">
        <div id="dashboard">
            <h1 class="text-3xl font-bold mb-6">Bem-vinda de volta!</h1>
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                    <p class="text-gray-400">Total de Cliques</p>
                    <h3 class="text-3xl font-bold mt-2">0</h3>
                </div>
                <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                    <p class="text-gray-400">Conversão</p>
                    <h3 class="text-3xl font-bold mt-2">0%</h3>
                </div>
                <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                    <p class="text-gray-400">Ganhos Estimados</p>
                    <h3 class="text-3xl font-bold mt-2 text-orange-500">R$ 0,00</h3>
                </div>
            </div>
        </div>
        
        <div id="links" class="hidden">
            <h1 class="text-3xl font-bold mb-6">Conversor de Links</h1>
            <div class="bg-gray-900 p-8 rounded-xl border border-gray-800">
                <input type="text" placeholder="Cole seu link aqui para converter..." class="w-full bg-black p-4 rounded-lg border border-gray-700 mb-4">
                <button class="bg-orange-600 px-6 py-3 rounded-lg font-bold w-full">Converter Link Agora</button>
            </div>
        </div>

        </main>

    <script>
        function show(id) {
            document.querySelectorAll('#content > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        lucide.createIcons();
    </script>
</body>
</html>
